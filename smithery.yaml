# Smithery config — https://smithery.ai/docs/build/project-config/smithery-yaml
#
# Smithery's CLI uses this to install prompt-to-asset into Claude Desktop /
# Cursor / VS Code / Windsurf / Cline with one command:
#
#   npx -y @smithery/cli install prompt-to-asset --client claude
#
# All provider API keys flow through env vars at runtime. No secret is ever
# baked into commandFunction — if `config.*` is undefined we pass an empty
# string, so the server starts and reports via `p2a doctor` which providers
# are live.

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      GEMINI_API_KEY:
        type: string
        title: "Google AI Studio key (free tier, ~1,500 img/day Nano Banana)"
        description: "Get from https://aistudio.google.com/apikey — no credit card."
      OPENAI_API_KEY:
        type: string
        title: "OpenAI key (gpt-image-1 / 1.5 / dall-e-3, native RGBA)"
      IDEOGRAM_API_KEY:
        type: string
        title: "Ideogram key (best wordmark rendering, 1-3 words)"
      RECRAFT_API_KEY:
        type: string
        title: "Recraft V3 key (native SVG output)"
      BFL_API_KEY:
        type: string
        title: "Black Forest Labs Flux key (photoreal hero art)"
      STABILITY_API_KEY:
        type: string
        title: "Stability AI key (SDXL / SD3 / Playground)"
      LEONARDO_API_KEY:
        type: string
        title: "Leonardo key (Phoenix / Diffusion XL)"
      FAL_API_KEY:
        type: string
        title: "fal.ai aggregator key"
      HF_TOKEN:
        type: string
        title: "Hugging Face read token — free tier, no credit card"
      REPLICATE_API_TOKEN:
        type: string
        title: "Replicate token (alt path for Flux / SDXL / SD3 / Recraft / Ideogram)"
      CLOUDFLARE_API_TOKEN:
        type: string
        title: "Cloudflare Workers AI token — free 10k neurons/day"
      CLOUDFLARE_ACCOUNT_ID:
        type: string
        title: "Cloudflare account id (paired with CLOUDFLARE_API_TOKEN)"
      P2A_MAX_SPEND_USD_PER_RUN:
        type: string
        title: "Optional cost cap in USD per tool call"
      P2A_ALLOWED_PATHS:
        type: string
        title: "Colon-separated extra filesystem roots the safePath guard accepts"
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'prompt-to-asset'],
      env: {
        GEMINI_API_KEY: config.GEMINI_API_KEY || '',
        OPENAI_API_KEY: config.OPENAI_API_KEY || '',
        IDEOGRAM_API_KEY: config.IDEOGRAM_API_KEY || '',
        RECRAFT_API_KEY: config.RECRAFT_API_KEY || '',
        BFL_API_KEY: config.BFL_API_KEY || '',
        STABILITY_API_KEY: config.STABILITY_API_KEY || '',
        LEONARDO_API_KEY: config.LEONARDO_API_KEY || '',
        FAL_API_KEY: config.FAL_API_KEY || '',
        HF_TOKEN: config.HF_TOKEN || '',
        REPLICATE_API_TOKEN: config.REPLICATE_API_TOKEN || '',
        CLOUDFLARE_API_TOKEN: config.CLOUDFLARE_API_TOKEN || '',
        CLOUDFLARE_ACCOUNT_ID: config.CLOUDFLARE_ACCOUNT_ID || '',
        P2A_MAX_SPEND_USD_PER_RUN: config.P2A_MAX_SPEND_USD_PER_RUN || '',
        P2A_ALLOWED_PATHS: config.P2A_ALLOWED_PATHS || ''
      }
    })
