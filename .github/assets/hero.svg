<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-labelledby="p2a-title p2a-desc">
  <title id="p2a-title">prompt-to-asset</title>
  <desc id="p2a-desc">MCP server and CLI for developer assets. One brief produces a ship-ready bundle of app icons, favicons, OG images, splash screens and vectors, with or without an API key.</desc>

  <defs>
    <linearGradient id="p2a-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.55" stop-color="#13112b"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="p2a-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="p2a-sub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="p2a-glow" cx="85%" cy="35%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" rx="24" fill="url(#p2a-bg)"/>
  <rect width="1200" height="340" rx="24" fill="url(#p2a-glow)"/>

  <g stroke="#1e293b" stroke-width="1" opacity="0.45">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
  </g>

  <text x="64" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="66" font-weight="800" fill="url(#p2a-accent)" letter-spacing="-2.5">prompt-to-asset</text>

  <text x="66" y="176" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="url(#p2a-sub)" font-weight="500">One brief. A ship-ready bundle. No API key required.</text>

  <text x="66" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#94a3b8">app icons &#183; favicons &#183; OG images &#183; logos &#183; splash screens &#183; SVG &#183; sprite sheets</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600">
    <g>
      <rect x="64" y="240" width="94" height="28" rx="14" fill="#065f46" fill-opacity="0.35" stroke="#10b981" stroke-width="1"/>
      <text x="111" y="258" fill="#6ee7b7" text-anchor="middle">zero-key</text>
    </g>
    <g>
      <rect x="168" y="240" width="74" height="28" rx="14" fill="#4c1d95" fill-opacity="0.35" stroke="#a78bfa" stroke-width="1"/>
      <text x="205" y="258" fill="#ddd6fe" text-anchor="middle">MCP 1.0</text>
    </g>
    <g>
      <rect x="252" y="240" width="86" height="28" rx="14" fill="#164e63" fill-opacity="0.35" stroke="#22d3ee" stroke-width="1"/>
      <text x="295" y="258" fill="#a5f3fc" text-anchor="middle">24 tools</text>
    </g>
    <g>
      <rect x="348" y="240" width="108" height="28" rx="14" fill="#78350f" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1"/>
      <text x="402" y="258" fill="#fde68a" text-anchor="middle">60+ models</text>
    </g>
    <g>
      <rect x="466" y="240" width="128" height="28" rx="14" fill="#831843" fill-opacity="0.35" stroke="#ec4899" stroke-width="1"/>
      <text x="530" y="258" fill="#fbcfe8" text-anchor="middle">MIT licensed</text>
    </g>
  </g>

  <text x="66" y="298" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#64748b">$ npx prompt-to-asset init</text>

  <g transform="translate(860, 58)">
    <rect x="0" y="0" width="64" height="64" rx="18" fill="#8b5cf6"/>
    <circle cx="12" cy="12" r="3" fill="#fff" opacity="0.6"/>

    <circle cx="108" cy="32" r="32" fill="#22d3ee"/>
    <path d="M 96 32 L 108 44 L 124 20" stroke="#0b1120" stroke-width="3" fill="none" stroke-linecap="round"/>

    <rect x="148" y="0" width="64" height="64" rx="6" fill="#10b981"/>
    <rect x="160" y="20" width="40" height="6" rx="3" fill="#0b1120" opacity="0.4"/>
    <rect x="160" y="32" width="28" height="6" rx="3" fill="#0b1120" opacity="0.4"/>
    <rect x="160" y="44" width="34" height="6" rx="3" fill="#0b1120" opacity="0.4"/>

    <rect x="0" y="74" width="64" height="64" rx="6" fill="#f59e0b"/>
    <path d="M 20 100 L 32 88 L 44 100 L 44 112 L 20 112 Z" fill="#0b1120" opacity="0.4"/>
    <circle cx="24" cy="88" r="4" fill="#fff" opacity="0.7"/>

    <rect x="74" y="74" width="64" height="64" rx="32" fill="#ef4444"/>
    <circle cx="106" cy="106" r="14" fill="#fff" opacity="0.3"/>

    <rect x="148" y="74" width="64" height="64" rx="14" fill="#ec4899"/>
    <path d="M 168 106 L 178 94 L 192 108 L 192 118 L 168 118 Z" fill="#fff" opacity="0.35"/>

    <rect x="0" y="148" width="64" height="64" rx="10" fill="#3b82f6"/>
    <text x="32" y="192" font-family="ui-monospace, monospace" font-size="28" font-weight="800" fill="#0b1120" text-anchor="middle" opacity="0.6">ICO</text>

    <rect x="74" y="148" width="64" height="64" rx="6" fill="#a855f7"/>
    <text x="106" y="192" font-family="ui-monospace, monospace" font-size="22" font-weight="800" fill="#0b1120" text-anchor="middle" opacity="0.6">OG</text>

    <rect x="148" y="148" width="64" height="64" rx="18" fill="#14b8a6"/>
    <path d="M 170 168 L 190 198 L 170 198 Z" fill="#0b1120" opacity="0.45"/>
    <text x="180" y="192" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#0b1120" text-anchor="middle" opacity="0.8">SVG</text>
  </g>
</svg>
