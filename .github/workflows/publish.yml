name: Publish MCP server to npm

# Publishes `prompt-to-asset` to npm with OIDC-backed provenance.
#
# Trusted Publisher is configured at
#   https://www.npmjs.com/package/prompt-to-asset → Settings → Publishing access
# bound to repo MohamedAbdallah-14/prompt-to-asset, workflow publish.yml,
# environment npm-publish. OIDC handles auth — no NPM_TOKEN in repo secrets.
#
# Trigger: push a tag shaped `mcp-server-vX.Y.Z`. The `environment: npm-publish`
# gate lets you require a manual approval click (optional — set reviewers in
# Settings → Environments).

on:
  push:
    tags:
      - "mcp-server-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish prompt-to-asset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Explicit registry + scrub any .npmrc that might have been seeded
      # with a stale _authToken template. With OIDC Trusted Publisher,
      # npm exchanges the id-token directly; a zero-length _authToken
      # line from setup-node's registry-url breaks that exchange and
      # produces a `404 PUT /prompt-to-asset` with the misleading
      # "not in this registry" body.
      - name: Configure npm for OIDC publish
        run: |
          rm -f "$HOME/.npmrc" ./.npmrc
          npm config set registry https://registry.npmjs.org/
          npm config get registry

      - name: Ensure sharp resolves on the runner
        run: npm install --no-save sharp

      - name: Type-check
        run: npm run typecheck

      # Build BEFORE tests — the integration tests under tests/integration/
      # exec the built `p2a` binary. Same ordering as ci.yml.
      - name: Build
        run: npm run build

      - name: Data integrity (registry vs routing-table)
        run: node packages/mcp-server/dist/index.js doctor --data

      - name: Test
        run: npm run test:run

      - name: Smoke (MCP stdio + tool surface)
        run: npm run smoke

      - name: Evals regression gate
        run: node evals/scripts/run.mjs --check

      - name: Publish with provenance (OIDC trusted publisher)
        working-directory: packages/mcp-server
        # With Trusted Publisher configured, OIDC signs the upload and
        # attaches sigstore provenance. No NPM_TOKEN needed.
        run: npm publish --access public --provenance
