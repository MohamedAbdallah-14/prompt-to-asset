name: Publish MCP server to npm

# Publishes `prompt-to-asset` to npm with OIDC-backed provenance.
#
# Trusted Publisher is configured at
#   https://www.npmjs.com/package/prompt-to-asset → Settings → Publishing access
# bound to repo MohamedAbdallah-14/prompt-to-asset, workflow publish.yml,
# environment npm-publish. OIDC handles auth — no NPM_TOKEN in repo secrets.
#
# Trigger: push a tag shaped `mcp-server-vX.Y.Z`.

on:
  push:
    tags:
      - "mcp-server-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish prompt-to-asset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish

    steps:
      - uses: actions/checkout@v6

      # Node 24 ships with npm 11+, which supports Trusted Publisher OIDC
      # token exchange. Node 22 LTS ships with npm 10.9.x, which responds
      # with ENEEDAUTH because it doesn't know to swap
      # ACTIONS_ID_TOKEN_REQUEST_* for a short-lived publish token.
      # Self-upgrading (`npm install -g npm@latest`) + corepack both
      # failed to actually flip the active binary on the runner.
      - name: Set up Node 24 (npm 11+ required for OIDC publish)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Verify npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Ensure sharp resolves on the runner
        run: npm install --no-save sharp

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Data integrity (registry vs routing-table)
        run: node packages/mcp-server/dist/index.js doctor --data

      - name: Test
        run: npm run test:run

      - name: Smoke (MCP stdio + tool surface)
        run: npm run smoke

      - name: Evals regression gate
        run: node evals/scripts/run.mjs --check

      - name: OIDC diagnostic
        # Surface whether the OIDC env vars are actually plumbed through
        # the `environment: npm-publish` gate. If these are empty, the
        # environment is blocking the id-token: write scope and we need
        # to remove / reconfigure it. Values are intentionally not echoed.
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL: set"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_URL: UNSET — OIDC won't work"
          fi
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: set"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: UNSET — OIDC won't work"
          fi
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "--- .npmrc (user) ---"
          cat "$HOME/.npmrc" 2>/dev/null || echo "no ~/.npmrc"
          echo "--- .npmrc (repo) ---"
          cat ./.npmrc 2>/dev/null || echo "no ./.npmrc"

      - name: Publish with OIDC provenance
        working-directory: packages/mcp-server
        env:
          # Blank NODE_AUTH_TOKEN so npm 11+ falls through to the OIDC
          # Trusted Publisher exchange (auto-trigger when id-token: write
          # is granted and no static token is present). The npm-publish
          # environment was leaking a static NODE_AUTH_TOKEN into every
          # step; this override stops it from reaching the publish call.
          NODE_AUTH_TOKEN: ""
        run: npm publish --provenance --access public
