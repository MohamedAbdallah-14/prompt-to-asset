name: Publish MCP server to npm

# Publishes `prompt-to-asset` to npm with OIDC-backed provenance.
#
# Trusted Publisher is configured at
#   https://www.npmjs.com/package/prompt-to-asset → Settings → Publishing access
# bound to repo MohamedAbdallah-14/prompt-to-asset, workflow publish.yml,
# environment npm-publish. OIDC handles auth — no NPM_TOKEN in repo secrets.
#
# Trigger: push a tag shaped `mcp-server-vX.Y.Z`.

on:
  push:
    tags:
      - "mcp-server-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish prompt-to-asset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure sharp resolves on the runner
        run: npm install --no-save sharp

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Data integrity (registry vs routing-table)
        run: node packages/mcp-server/dist/index.js doctor --data

      - name: Test
        run: npm run test:run

      - name: Smoke (MCP stdio + tool surface)
        run: npm run smoke

      - name: Evals regression gate
        run: node evals/scripts/run.mjs --check

      - name: OIDC diagnostic
        # Surface whether the OIDC env vars are actually plumbed through
        # the `environment: npm-publish` gate. If these are empty, the
        # environment is blocking the id-token: write scope and we need
        # to remove / reconfigure it. Values are intentionally not echoed.
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL: set"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_URL: UNSET — OIDC won't work"
          fi
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: set"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: UNSET — OIDC won't work"
          fi
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "--- .npmrc (user) ---"
          cat "$HOME/.npmrc" 2>/dev/null || echo "no ~/.npmrc"
          echo "--- .npmrc (repo) ---"
          cat ./.npmrc 2>/dev/null || echo "no ./.npmrc"

      - name: Publish with OIDC provenance
        working-directory: packages/mcp-server
        env:
          # Explicitly blank any NODE_AUTH_TOKEN coming from the
          # npm-publish environment. When NODE_AUTH_TOKEN is empty AND
          # `id-token: write` is granted, npm 10.9+ performs the OIDC
          # exchange against the configured Trusted Publisher instead
          # of presenting a stale static token (which was rejecting
          # with 404 Not Found).
          NODE_AUTH_TOKEN: ""
        run: npm publish --provenance --access public
