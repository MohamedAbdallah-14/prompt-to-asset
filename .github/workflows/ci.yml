name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["20", "22", "24"]
        include:
          - os: macos-latest
            node: "22"
          - os: windows-latest
            node: "22"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

      - name: Smoke test (MCP stdio list_tools)
        if: runner.os != 'Windows'
        run: npm run smoke

      - name: CLI help (smoke)
        run: node packages/mcp-server/dist/index.js --help

      - name: CLI doctor (smoke)
        run: node packages/mcp-server/dist/index.js doctor

      - name: Verify mirrors are in sync
        if: runner.os != 'Windows'
        run: npm run verify
