name: Docker

# Builds a multi-arch image and pushes to GitHub Container Registry (ghcr.io).
# Triggers:
#   - push to main (tag: latest + commit sha)
#   - release tag mcp-server-v* (tag: <version> + latest)
#   - manual dispatch
#
# Consumers run:
#   docker run --rm -i ghcr.io/mohamedabdallah-14/prompt-to-asset
# for the MCP stdio server, or wire it into Claude Desktop / Cursor with:
#   "command": "docker", "args": ["run","--rm","-i","ghcr.io/mohamedabdallah-14/prompt-to-asset"]

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: build / push to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/prompt-to-asset
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' || github.ref == 'refs/heads/main' }}
            type=match,pattern=mcp-server-v(\d+\.\d+\.\d+),group=1,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=prompt-to-asset
            org.opencontainers.image.description=MCP server + CLI for production-grade software assets.
            org.opencontainers.image.source=https://github.com/MohamedAbdallah-14/prompt-to-asset
            org.opencontainers.image.licenses=MIT

      - name: Build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            WITH_SHARP=1
            NODE_VERSION=22
