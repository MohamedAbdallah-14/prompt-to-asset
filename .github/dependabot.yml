version: 2
updates:
  # Monorepo root — workspaces resolve here
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      dev-tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"
          - "typescript"
          - "vitest"
          - "@vitest/*"
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
      image-pipeline:
        patterns:
          - "sharp"
          - "@resvg/*"
          - "satori*"
          - "svgo"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Container base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build"
      include: "scope"
